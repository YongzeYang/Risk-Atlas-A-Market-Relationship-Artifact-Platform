services:
  postgres:
    image: postgres:16
    container_name: risk-atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432
    volumes:
      - ${POSTGRES_DATA_DIR}:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: aws/Dockerfile.api
    image: risk-atlas-api:latest
    container_name: risk-atlas-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOST: 0.0.0.0
      WEB_PORT: ${WEB_PORT:-443}
      ARTIFACT_STORAGE_BACKEND: ${ARTIFACT_STORAGE_BACKEND:-local_fs}
      DATABASE_URL: ${DATABASE_URL}
      RISK_ATLAS_INVITE_CODES: ${RISK_ATLAS_INVITE_CODES}
      RISK_ATLAS_INVITE_SALT: ${RISK_ATLAS_INVITE_SALT}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ARTIFACT_ROOT_DIR: /var/lib/risk-atlas/artifacts
      ARTIFACT_CACHE_DIR: ${ARTIFACT_CACHE_DIR:-/var/lib/risk-atlas/artifacts/cache}
      BSM_WRITER_BIN: ${BSM_WRITER_BIN:-/opt/risk-atlas/bin/risk_atlas_bsm_writer}
      BSM_INCREMENTAL_BUILDER_BIN: ${BSM_INCREMENTAL_BUILDER_BIN:-/opt/risk-atlas/bin/risk_atlas_bsm_incremental_builder}
      BSM_QUERY_BIN: ${BSM_QUERY_BIN:-/opt/risk-atlas/bin/risk_atlas_bsm_query}
      AWS_REGION: ${AWS_REGION:-}
      S3_ARTIFACT_BUCKET: ${S3_ARTIFACT_BUCKET:-}
      S3_ARTIFACT_PREFIX: ${S3_ARTIFACT_PREFIX:-}
      S3_SIGNED_URL_TTL_SECONDS: ${S3_SIGNED_URL_TTL_SECONDS:-900}
    ports:
      - 127.0.0.1:${API_PORT:-3000}:3000
    volumes:
      - ${ARTIFACT_ROOT_DIR}:/var/lib/risk-atlas/artifacts
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('node:http').get('http://127.0.0.1:3000/health',
          (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error',
          () => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
