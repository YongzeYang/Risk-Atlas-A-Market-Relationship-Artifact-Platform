services:
  postgres:
    image: postgres:16
    container_name: risk-atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: risk_atlas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - risk_atlas_postgres_data:/var/lib/postgresql/data

volumes:
  risk_atlas_postgres_data: